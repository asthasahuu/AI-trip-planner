<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f97316'/><text y='70' x='50' text-anchor='middle' font-size='60' font-family='sans-serif'>✈</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> AI Trip Planner</title>
  <link rel="stylesheet" href="/trip-planner/static/css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">✈</div>
    <span>AI Trip Planner</span>
  </a>
  <div class="nav-right" id="nav-right">
    <a href="login.html"  class="btn btn-outline">Login In</a>
    <a href="signup.html" class="btn btn-dark">Get Started Free</a>
  </div>
</nav>

<!-- TOAST -->
<div id="toast-host"></div>

<!-- LOADING -->
<div class="loading-overlay" id="loader">
  <div class="loader-ring"><div class="loader-icon">✈</div></div>
  <div class="loader-title" id="loader-title">Signing you in...</div>
  <div class="loader-sub"   id="loader-sub">Just a moment</div>
</div>

<!-- AUTH FORM -->
<div class="auth-page">
  <div class="auth-card">

    <!-- Banner -->
    <div class="auth-banner">
      <div class="auth-brand">
        <div class="auth-brand-icon">✈</div>
        <div class="auth-brand-title">Welcome Back</div>
        <div class="auth-brand-sub">Sign in to continue planning your adventures</div>
      </div>
    </div>

    <!-- Form -->
    <div class="auth-body">
      <!-- Error message -->
      <div class="form-error" id="login-error">
        <span>⚠&nbsp;</span><span></span>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label class="field-label" for="l-email">Email Address</label>
          <input class="field-input" type="email" id="l-email"
            name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label class="field-label" for="l-password">Password</label>
          <input class="field-input" type="password" id="l-password"
            name="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-dark btn-full btn-lg" id="btn-login" style="margin-top:4px">
          Login In →
        </button>
      </form>

      <div class="auth-link" style="margin-top:20px">
        Don't have an account? <a href="signup.html">Create one free</a>
      </div>
    </div>

  </div>
</div>

<script src="/trip-planner/static/js/app.js"></script>
<script>
  initLoginPage();

  // Handle ?next= redirect after login
  (function () {
    var params = new URLSearchParams(window.location.search);
    var next   = params.get('next');
    if (next) {
      // Override redirect target
      var form = document.getElementById('login-form');
      if (form) {
        form.addEventListener('submit', function() {
          // After successful login, redirect to 'next'
          sessionStorage.setItem('tp_login_next', next);
        });
      }
    }
  }());
</script>
</body>
</html>
