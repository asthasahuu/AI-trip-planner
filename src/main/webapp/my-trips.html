<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f97316'/><text y='70' x='50' text-anchor='middle' font-size='60' font-family='sans-serif'>✈</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> AI Trip Planner</title>
  <link rel="stylesheet" href="/trip-planner/static/css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">✈</div>
    <span>AI Trip Planner</span>
  </a>
  <div class="nav-right" id="nav-right">
    <!-- rendered by JS -->
  </div>
</nav>

<!-- TOAST -->
<div id="toast-host"></div>

<!-- MY TRIPS PAGE -->
<div class="trips-page">

  <div style="max-width:1140px;margin:0 auto;">

    <div class="trips-header">
      <div>
        <div class="trips-h1">My Trips</div>
        <div class="trips-sub" id="trips-cnt">Your saved AI-generated travel itineraries</div>
      </div>
      <a href="create-trip.html" class="btn btn-dark">+ Create New Trip</a>
    </div>

    <!-- Trip cards rendered here -->
    <div id="trips-list">
      <!-- Skeleton shown while loading -->
      <div class="trips-grid">
        <div class="trip-card">
          <div class="tc-thumb pulse" style="background:var(--gray-200)"></div>
          <div class="tc-body">
            <div class="pulse" style="height:22px;background:var(--gray-200);border-radius:6px;margin-bottom:10px"></div>
            <div class="pulse" style="height:14px;background:var(--gray-100);border-radius:6px;width:60%"></div>
          </div>
          <div class="tc-foot">
            <div class="pulse" style="height:12px;background:var(--gray-100);border-radius:6px;width:40%"></div>
          </div>
        </div>
        <div class="trip-card">
          <div class="tc-thumb pulse" style="background:var(--gray-200)"></div>
          <div class="tc-body">
            <div class="pulse" style="height:22px;background:var(--gray-200);border-radius:6px;margin-bottom:10px"></div>
            <div class="pulse" style="height:14px;background:var(--gray-100);border-radius:6px;width:50%"></div>
          </div>
          <div class="tc-foot">
            <div class="pulse" style="height:12px;background:var(--gray-100);border-radius:6px;width:35%"></div>
          </div>
        </div>
        <div class="trip-card">
          <div class="tc-thumb pulse" style="background:var(--gray-200)"></div>
          <div class="tc-body">
            <div class="pulse" style="height:22px;background:var(--gray-200);border-radius:6px;margin-bottom:10px"></div>
            <div class="pulse" style="height:14px;background:var(--gray-100);border-radius:6px;width:55%"></div>
          </div>
          <div class="tc-foot">
            <div class="pulse" style="height:12px;background:var(--gray-100);border-radius:6px;width:38%"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="/trip-planner/static/js/app.js"></script>
<script>initMyTripsPage();</script>
</body>
</html>
