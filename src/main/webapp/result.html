<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23f97316'/><text y='70' x='50' text-anchor='middle' font-size='60' font-family='sans-serif'>✈</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trip Planner</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- App CSS -->
  <link rel="stylesheet" href="/trip-planner/static/css/style.css">

  <style>
    /* Override: result page must be exactly viewport height */
    body { overflow: hidden; }

    /* Leaflet popup style fix */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.12) !important;
    }
    .leaflet-popup-content {
      margin: 14px 16px !important;
      font-family: 'Plus Jakarta Sans', sans-serif !important;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">✈</div>
    <span>AI Trip Planner</span>
  </a>
  <div class="nav-right" id="nav-right">
    <!-- rendered by JS -->
  </div>
</nav>

<!-- TOAST -->
<div id="toast-host"></div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loader">
  <div class="loader-ring"><div class="loader-icon">✈</div></div>
  <div class="loader-title" id="loader-title">Loading your trip...</div>
  <div class="loader-sub"   id="loader-sub">Fetching saved itinerary</div>
</div>

<!-- ══════════════════════════════════════════════════
     RESULT LAYOUT: LEFT = itinerary | RIGHT = map
══════════════════════════════════════════════════ -->
<div class="result-layout">

  <!-- ── LEFT: Itinerary Sidebar ── -->
  <div class="itin-panel">

    <!-- Sticky header -->
    <div class="itin-header">
      <div class="itin-header-top">
        <button class="itin-back" onclick="handleBack()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
          My Trips
        </button>
        <div class="itin-actions" id="itin-actions"></div>
      </div>
      <div class="itin-dest"  id="itin-dest">Loading...</div>
      <div class="itin-chips" id="itin-chips"></div>
    </div>

    <!-- Scrollable day cards -->
    <div class="itin-scroll" id="itin-days">
      <!-- filled by renderItinerary() -->
      <div style="padding:32px 24px;color:var(--gray-400);text-align:center">
        <div style="font-size:40px;margin-bottom:14px">✨</div>
        <div style="font-size:15px">Loading your itinerary...</div>
      </div>
    </div>

  </div><!-- /itin-panel -->

  <!-- ── RIGHT: Map ── -->
  <div class="map-panel">

    <!-- Leaflet map container -->
    <div id="trip-map"></div>

    <!-- Floating info card shown when a pin is dropped -->
    <div class="map-info" id="map-info">
      <button class="map-info-close" onclick="closeMapInfo()">✕</button>
      <div class="map-place-name" id="map-place-name"></div>
      <div class="map-place-sub"  id="map-place-sub"></div>
    </div>

  </div><!-- /map-panel -->

</div><!-- /result-layout -->

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- App JS -->
<script src="/trip-planner/static/js/app.js"></script>
<script>initResultPage();</script>
<!-- Share Modal -->
<div class="modal-overlay" id="share-modal" onclick="if(event.target===this)closeShareModal()">
  <div class="modal-box">
    <div class="modal-title">🔗 Share this Trip</div>
    <div class="modal-sub">Anyone with this link can view this itinerary</div>
    <div class="share-link-box">
      <input class="share-link-input" id="share-link-input" type="text" readonly>
      <button class="share-copy-btn" onclick="copyShareLink()">Copy</button>
    </div>
    <button class="modal-close" onclick="closeShareModal()">Close</button>
  </div>
</div>
</body>
</html>
